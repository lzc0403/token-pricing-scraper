# LLM Token 定价数据源配置
# 字段说明：
#   id       : 源唯一标识，会写入每条记录
#   name     : 人类可读名称
#   url      : 主抓取 URL（部分源有多个，用 urls 列表）
#   urls     : 多 URL 列表（kimi 用）
#   parser   : scrapers 下对应的 parser 模块名（不含 .py）
#   currency : 该源货币，CNY / USD
#   js       : 是否需要浏览器渲染（SPA / JS 动态渲染的页面为 true；静态文档为 false）
#   region   : 区域过滤（tencent 仅取 mainland 区域表）
#   fallback_url : 主 URL 失效时的回退地址（aliyun 用）
#   note     : 备注
- id: aliyun
  name: 阿里云百炼
  url: https://help.aliyun.com/zh/model-studio/developer-reference/billing-for-text-generation
  fallback_url: https://help.aliyun.com/zh/model-studio/developer-reference/billing-for-text-rerank
  parser: aliyun
  currency: CNY
  js: true
  note: 主用 URL 已失效(404)，自动回退到 fallback_url（重定向至 model-pricing 总览页）

- id: volcengine
  url: https://docs.volcengine.com/docs/82379/1544106?redirect=1&lang=zh
  parser: volcengine
  currency: CNY
  js: true

- id: tencent
  url: https://www.tencentcloud.com/zh/document/product/1300/78937
  parser: tencent
  currency: USD
  region: mainland          # 只取「广州/中国大陆」区域表，忽略「新加坡」等海外区域
  js: true                 # 文档为 SPA，静态 HTML 无表格，需浏览器渲染

- id: bigmodel
  url: https://open.bigmodel.cn/pricing
  parser: bigmodel
  currency: CNY
  js: true

- id: deepseek
  url: https://api-docs.deepseek.com/zh-cn/quick_start/pricing/
  parser: deepseek
  currency: CNY
  js: false

- id: minimax
  url: https://platform.minimaxi.com/subscribe/token-plan?tab=api-enterprise
  parser: minimax
  currency: CNY
  js: true

- id: kimi
  urls:
    - https://platform.kimi.com/docs/pricing/chat-k26
    - https://platform.kimi.com/docs/pricing/chat-k25
    - https://platform.kimi.com/docs/pricing/chat-k27-code
  parser: kimi
  currency: CNY
  js: true

- id: modelmesh
  url: https://global.modelmesh.info/model
  parser: modelmesh
  currency: CNY
  js: true
