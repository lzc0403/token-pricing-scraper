# OpenRouter 抓取规则
# 自动从 https://openrouter.ai/api/v1/models?sort=top-weekly 更新
#
# 规则：
#   1. whitelist：始终收录的热门/主力模型（id 必须是 OpenRouter 精确 model id）
#   2. top_weekly_extra：在白名单外再取 top-weekly 前 N 个非免费文本模型
#   3. exclude_free：跳过 $0 免费模型
#   4. 解析后写入 data/openrouter_raw.json，core/openrouter_verify 做二次验证

exclude_free: true
top_weekly_extra: 12
output_modalities: [text]

# 热门主力白名单（优先，顺序即展示优先级）
whitelist:
  - id: openai/gpt-4o
    model: GPT-4o
    note: 长青主流
  - id: openai/gpt-5
    model: GPT-5
    note: 旗舰
  - id: anthropic/claude-sonnet-5
    model: Claude Sonnet 5
    note: Claude 主力
  - id: anthropic/claude-opus-4.8
    model: Claude Opus 4.8
    note: Claude 旗舰
  - id: google/gemini-2.5-pro
    model: Gemini 2.5 Pro
    note: Gemini 旗舰
  - id: google/gemini-2.5-flash
    model: Gemini 2.5 Flash
    note: Gemini 高频
  - id: deepseek/deepseek-v4-pro
    model: DeepSeek V4 Pro
    note: 国内旗舰 OpenRouter 价
  - id: deepseek/deepseek-v4-flash
    model: DeepSeek V4 Flash
    note: 国内高频 OpenRouter 价
  - id: minimax/minimax-m3
    model: MiniMax M3
    note: 新品跟进
  - id: moonshotai/kimi-k2.6
    model: Kimi K2.6
    note: Kimi 现役
  - id: moonshotai/kimi-k3
    model: Kimi K3
    note: 新品跟进

# 二次验证阈值
verify:
  # 换算后价格与 raw*1e6 相对误差超过此值 → 可疑
  price_tol: 0.001
  # 白名单缺失多少个算失败
  max_missing_whitelist: 3
