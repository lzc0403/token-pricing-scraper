# 目标关注模型（watchlist）及别名
# 匹配规则（见 core/matcher.py）：
#   1. 归一化：lowercase、去空格、去 - 与 _ 后比较
#   2. 默认精确匹配；仅 alias 对象显式声明 match: prefix 时允许前缀匹配
#   3. 命中返回 canonical；未命中为 None
models:
  - canonical: DeepSeek V4 Pro
    aliases: [DeepSeek-V4-Pro, deepseek-v4-pro]
  - canonical: DeepSeek V4 Flash
    aliases: [DeepSeek-V4-Flash, deepseek-v4-flash]
  - canonical: DeepSeek V3.2
    aliases: [Deepseek-v3.2, deepseek-v3.2]
  - canonical: GLM-5.1
    aliases: [GLM-5.1, glm-5.1]
  - canonical: GLM-5.2
    aliases: [GLM-5.2, glm-5.2]
  - canonical: Kimi K2.6
    aliases: [kimi-k2.6, Kimi K2.6]
  - canonical: Kimi K2.7 Code
    aliases: [kimi-k2.7-code, Kimi K2.7 Code]
  - canonical: Kimi K3
    aliases: [kimi-k3, Kimi K3, moonshotai/kimi-k3]
  - canonical: MiniMax M2.7
    aliases: [MiniMax-M2.7, minimax-m2.7]
  - canonical: MiniMax M3
    aliases: [MiniMax-M3, minimax-m3, MiniMax M3]
  - canonical: Doubao Seed 2.1 Pro
    aliases: [doubao-seed-2.1-pro, Doubao-Seed-2.1-Pro]
  - canonical: Doubao Seed 2.1 Turbo
    aliases: [doubao-seed-2.1-turbo, Doubao-Seed-2.1-Turbo]
  - canonical: Seedance 2.0
    aliases: [Seedance 2.0, Seedance-2.0]
  - canonical: Qwen3.7 Max
    aliases: [qwen3.7-max, Qwen3.7-Max]
  - canonical: Qwen3.7 Plus
    aliases: [qwen3.7-plus, Qwen3.7-Plus]
